<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 320px;
    font-family: 'Sarabun', system-ui, sans-serif;
    background: linear-gradient(135deg, #eef7ff 0%, #f5fbff 50%, #eafffb 100%);
    padding: 16px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #e2e8f0;
  }
  .header-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, #1d72ef, #0eaba0);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 18px;
  }
  .header-title {
    font-size: 15px;
    font-weight: 700;
    color: #1e293b;
  }
  .header-sub {
    font-size: 11px;
    color: #64748b;
  }
  .status-card {
    background: white;
    border-radius: 12px;
    padding: 14px;
    border: 1px solid #e2e8f0;
    margin-bottom: 12px;
  }
  .status-label {
    font-size: 11px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .status-value {
    font-size: 20px;
    font-weight: 700;
    color: #1e293b;
  }
  .progress-bar {
    width: 100%;
    height: 6px;
    background: #e2e8f0;
    border-radius: 3px;
    margin-top: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #1d72ef, #0eaba0);
    border-radius: 3px;
    transition: width 0.3s ease;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  .stat-box {
    background: white;
    border-radius: 10px;
    padding: 10px;
    border: 1px solid #e2e8f0;
    text-align: center;
  }
  .stat-number {
    font-size: 18px;
    font-weight: 700;
    color: #1e293b;
  }
  .stat-label {
    font-size: 11px;
    color: #94a3b8;
    margin-top: 2px;
  }
  .actions {
    display: flex;
    gap: 8px;
  }
  .btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, #1d72ef, #0eaba0);
    color: white;
  }
  .btn-primary:hover {
    opacity: 0.9;
  }
  .btn-secondary {
    background: white;
    color: #475569;
    border: 1px solid #e2e8f0;
  }
  .btn-secondary:hover {
    background: #f8fafc;
  }
  .error-list {
    max-height: 100px;
    overflow-y: auto;
    margin-top: 8px;
    font-size: 11px;
    color: #ef4444;
  }
  .error-item {
    padding: 4px 0;
    border-bottom: 1px solid #f1f5f9;
  }
  .empty-state {
    text-align: center;
    color: #94a3b8;
    padding: 20px;
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">&#128137;</div>
  <div>
    <div class="header-title">DMIS Auto Fill</div>
    <div class="header-sub">HD Registry Integration</div>
  </div>
</div>

<div id="content">
  <div class="empty-state">
    Waiting for data from HD Registry...<br>
    <span style="font-size: 11px; color: #cbd5e1;">Click &quot;Auto Fill DMIS&quot; from the registry page</span>
  </div>
</div>

<script>
(async function() {
  const content = document.getElementById('content');

  async function loadStatus() {
    try {
      const response = await chrome.runtime.sendMessage({ action: 'getStatus' });
      if (response && response.success) {
        renderStatus(response.status);
      }
    } catch (e) {
      // No active filling process
    }
  }

  function renderStatus(status) {
    if (!status || status.total === 0) {
      content.innerHTML = '<div class="empty-state">No active filling process<br><span style="font-size: 11px; color: #cbd5e1;">Click &quot;Auto Fill DMIS&quot; from the registry page</span></div>';
      return;
    }

    const progress = status.total > 0 ? (status.completed / status.total * 100) : 0;
    const hasErrors = status.errors && status.errors.length > 0;

    let html = '<div class="status-card"><div class="status-label">Progress</div>';
    html += '<div class="status-value">' + status.completed + ' / ' + status.total + '</div>';
    html += '<div class="progress-bar"><div class="progress-fill" style="width: ' + progress + '%"></div></div>';

    if (hasErrors) {
      html += '<div class="error-list">';
      for (const err of status.errors) {
        const msg = typeof err === 'string' ? err : (err.message || JSON.stringify(err));
        html += '<div class="error-item">' + escapeHtml(msg) + '</div>';
      }
      html += '</div>';
    }
    html += '</div>';

    html += '<div class="stats-grid">';
    html += '<div class="stat-box"><div class="stat-number">' + status.current + '</div><div class="stat-label">Current</div></div>';
    html += '<div class="stat-box"><div class="stat-number" style="color: ' + (hasErrors ? '#ef4444' : '#10b981') + '">' + status.errors.length + '</div><div class="stat-label">Errors</div></div>';
    html += '</div>';

    html += '<div class="actions">';
    html += '<button class="btn btn-secondary" id="btnRefresh">Refresh</button>';
    html += '<button class="btn btn-primary" id="btnOpenDMIS">Open DMIS</button>';
    html += '</div>';

    content.innerHTML = html;

    document.getElementById('btnRefresh').addEventListener('click', loadStatus);
    document.getElementById('btnOpenDMIS').addEventListener('click', function() {
      chrome.tabs.create({
        url: 'https://iam.nhso.go.th/realms/nhso/protocol/openid-connect/auth?client_id=ucapps4&response_type=code&scope=openid&redirect_uri=https%3A%2F%2Fucapps4.nhso.go.th%2Fdisease2ckd%2FossOpen'
      });
    });
  }

  chrome.runtime.onMessage.addListener((request) => {
    if (request.action === 'statusChanged') {
      renderStatus(request.status);
    }
  });

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  loadStatus();
})();
</script>

</body>
</html>
